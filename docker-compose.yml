services:
  hbbs:
    image: rustdesk/rustdesk-server:latest
    restart: unless-stopped
    command: hbbs -r hbbr:21117
    environment:
      ALWAYS_USE_RELAY: "Y"
    volumes:
      - rustdesk_server_data:/root
    ports:
      - "21115:21115"
      - "21116:21116"
      - "21116:21116/udp"
      - "21118:21118"

  hbbr:
    image: rustdesk/rustdesk-server:latest
    restart: unless-stopped
    command: hbbr
    volumes:
      - rustdesk_server_data:/root
    ports:
      - "21117:21117"
      - "21119:21119"

  postgresdb:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: rustdesk
      POSTGRES_PASSWORD: rustdesk123
      POSTGRES_DB: rustdesk
    volumes:
      - ./pgdata_new:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: ./api
    depends_on:
      - postgresdb
    environment:
      DATABASE_URL: postgres://rustdesk:rustdesk123@postgresdb:5432/rustdesk
      JWT_SECRET: supersecretkey
      ID_SERVER: "76.13.174.204"
      RELAY_SERVER: "76.13.174.204"
      RUSTDESK_KEY: "FiClwwg0SMw4aI3SAD1kyfzZFTWjb5nmD50q+8622JY="
      ADMIN_EMAIL: "administrador"
      ADMIN_PASSWORD: "tipref#2026"
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app
      - /app/node_modules
      - ./data:/root:ro

  frontend:
    build: ./frontend
    ports:
      - "8080:80"

volumes:
  rustdesk_server_data:
